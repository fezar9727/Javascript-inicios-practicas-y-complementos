<div class="container mt-5"> 
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="text-center mb-4">
                        <strong>Registro</strong>
                    </h2>

                    <form 
                        [formGroup]="form"
                        (ngSubmit)="registrar()"
                    >   

                        <div class="mb-3">
                            <label class="form-label">
                                Nombre
                            </label>
                            <input 
                                type="text" 
                                class="form-control"
                                formControlName="nombre"
                            >
                            <small 
                                class="text-danger"
                                *ngIf="
                                    form.get('nombre')?.touched && 
                                    form.get('nombre')?.invalid
                                "
                            >
                                El nombre es requerido y debe tener al menos 3 caracteres
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>
                            <input 
                                type="email" 
                                class="form-control"
                                formControlName="email"
                            >
                            <small 
                                class="text-danger"
                                *ngIf="
                                    form.get('email')?.touched && 
                                    form.get('email')?.invalid
                                "
                            >
                                El email es invalido
                            </small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            
                            <div class="input-group">
                                <input 
                                    [type]="passwordVisible ? 'text' : 'password'"
                                    class="form-control"
                                    formControlName="password"
                                >
                                <button 
                                    type="button" 
                                    class="btn btn-outline-secondary" 
                                    (click)="togglePasswordVisibility()"
                                >
                                    <i class="bi" [ngClass]="passwordVisible ? 'bi-eye-slash' : 'bi-eye'"></i>
                                </button>
                            </div>

                            <small 
                                class="text-danger"
                                *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
                            >
                                El password debe tener al menos 5 caracteres.
                            </small>
                        </div>

                        <button
                            type="submit"
                            class="btn w-100 btn-custom"
                            [disabled]="cargando || form.invalid"
                        >
                            {{ cargando ? 'Registrando...' : 'Registrarse' }}
                        </button>
                    </form> 
                    <div class="text-center mt-3">
                        <p class="mb-0">¿Ya tienes una cuenta?</p>

                        <a
                            routerLink="/login"
                            class="text-decoration-none"
                        >
                            Inicia sesión aquí
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
