<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty API</title>
    <link rel="icon" href="img/silueta-rick-and-morty.jpg" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white">

    <main class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-2 fw-bold text-uppercase text-white shadow-sm">
                Rick and Morty
            </h1>
            <div class="bg-primary pt-1 w-25 mx-auto rounded-pill opacity-50 mb-4"></div>
        </header>

        <section id="contenedor" class="row g-4 mb-5">
            </section>

        <nav class="d-flex justify-content-center gap-4 py-4" aria-label="Navegación">
            <button id="btnAnterior" class="btn btn-outline-success btn-lg px-5 rounded-pill fw-bold">
                Anterior
            </button>
            <button id="btnSiguiente" class="btn btn-outline-success btn-lg px-5 rounded-pill fw-bold">
                Siguiente
            </button>
        </nav>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
